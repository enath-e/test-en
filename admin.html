<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الأدمن - أناث</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background: #f4f1ea;
            padding: 2rem;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #b5838d;
            margin-bottom: 1rem;
        }
        .section {
            border-bottom: 1px solid #eee;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }
        input, textarea, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 1rem;
        }
        button {
            background: #b5838d;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        button:hover {
            background: #e5989b;
        }
        button.danger {
            background: #e5989b;
        }
        button.danger:hover {
            background: #d17a7a;
        }
        button.small {
            width: auto;
            padding: 5px 12px;
            margin: 2px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .card {
            border: 1px solid #eee;
            padding: 1rem;
            border-radius: 15px;
            background: #fefefe;
        }
        .card img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .status-badge {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: #e0e0e0;
        }
        .status-active {
            background: #a3b18a;
            color: white;
        }
        .status-inactive {
            background: #e5989b;
            color: white;
        }
        .note {
            background: #fef9e6;
            padding: 1rem;
            border-radius: 15px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border-right: 4px solid #e5989b;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #b5838d;
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-crown"></i> لوحة تحكم الأدمن - أناث</h1>
    <div class="note">
        <i class="fas fa-info-circle"></i> يمكنك التحكم بـ: الإعلانات، الفئات، والمنتجات. جميع التغييرات تحفظ في Firebase وتظهر لجميع المستخدمين فوراً.
    </div>

    <div id="loadingMsg" class="loading">جاري التحميل...</div>

    <!-- قسم الإعلانات -->
    <div class="section" id="adsSection" style="display:none;">
        <h2><i class="fas fa-ad"></i> إدارة الإعلانات (السلايدر)</h2>
        <div id="adsList"></div>
        <button id="addAdBtn"><i class="fas fa-plus"></i> إضافة إعلان جديد</button>
    </div>

    <!-- قسم الفئات -->
    <div class="section" id="categoriesSection" style="display:none;">
        <h2><i class="fas fa-th-large"></i> إدارة الفئات</h2>
        <div id="categoriesList"></div>
        <button id="addCategoryBtn"><i class="fas fa-plus"></i> إضافة فئة جديدة</button>
    </div>

    <!-- قسم المنتجات -->
    <div class="section" id="productsSection" style="display:none;">
        <h2><i class="fas fa-boxes"></i> إدارة المنتجات</h2>
        <div id="productsList"></div>
        <button id="addProductBtn"><i class="fas fa-plus"></i> إضافة منتج جديد</button>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // ===== إعدادات Firebase - استبدلها بإعدادات مشروعك =====
    const firebaseConfig = {
 apiKey: "AIzaSyD6CcJDUiXgCQxe_aL_j2aEi1nuQ2X2o5s",
    authDomain: "enath-7d5e8.firebaseapp.com",
    databaseURL: "https://enath-7d5e8-default-rtdb.firebaseio.com",
    projectId: "enath-7d5e8",
    storageBucket: "enath-7d5e8.firebasestorage.app",
    messagingSenderId: "101026768739",
    appId: "1:101026768739:web:c3635b04e972914a5b1556"
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let ads = [], categories = [], products = [];

    async function loadAllData() {
        document.getElementById('loadingMsg').style.display = 'block';
        
        try {
            const [adsSnap, catsSnap, prodsSnap] = await Promise.all([
                database.ref('ads').once('value'),
                database.ref('categories').once('value'),
                database.ref('products').once('value')
            ]);
            
            const adsData = adsSnap.val();
            ads = adsData ? Object.keys(adsData).map(key => ({ id: key, ...adsData[key] })) : [];
            
            const catsData = catsSnap.val();
            categories = catsData ? Object.keys(catsData).map(key => ({ id: key, ...catsData[key] })) : [];
            
            const prodsData = prodsSnap.val();
            products = prodsData ? Object.keys(prodsData).map(key => ({ id: key, ...prodsData[key] })) : [];
            
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('adsSection').style.display = 'block';
            document.getElementById('categoriesSection').style.display = 'block';
            document.getElementById('productsSection').style.display = 'block';
            
            renderAll();
        } catch (error) {
            console.error("خطأ:", error);
            document.getElementById('loadingMsg').innerText = 'حدث خطأ في التحميل. تأكد من اتصالك بالإنترنت.';
        }
    }

    async function saveToFirebase() {
        const adsObj = {};
        ads.forEach(ad => { adsObj[ad.id] = { image: ad.image, text: ad.text || '', active: ad.active }; });
        await database.ref('ads').set(adsObj);
        
        const catsObj = {};
        categories.forEach(cat => { catsObj[cat.id] = { name: cat.name, image: cat.image, active: cat.active }; });
        await database.ref('categories').set(catsObj);
        
        const prodsObj = {};
        products.forEach(prod => {
            prodsObj[prod.id] = {
                name: prod.name, price: prod.price, oldprice: prod.oldprice || '',
                desc: prod.desc || '', image: prod.image, categoryId: prod.categoryId, active: prod.active
            };
        });
        await database.ref('products').set(prodsObj);
    }

    async function renderAll() {
        renderAds();
        renderCategories();
        renderProducts();
    }

    function renderAds() {
        const container = document.getElementById('adsList');
        container.innerHTML = ads.map((ad, idx) => `
            <div class="card">
                <div class="flex-between">
                    <img src="${ad.image}" width="60">
                    <span class="status-badge ${ad.active ? 'status-active' : 'status-inactive'}">${ad.active ? 'نشط' : 'مخفي'}</span>
                </div>
                <p><strong>نص الإعلان:</strong> ${ad.text || 'لا يوجد'}</p>
                <div class="flex-between">
                    <button class="small" onclick="toggleAd('${ad.id}')"><i class="fas fa-eye${ad.active ? '-slash' : ''}"></i> ${ad.active ? 'إخفاء' : 'إظهار'}</button>
                    <button class="small danger" onclick="deleteAd('${ad.id}')"><i class="fas fa-trash"></i> حذف</button>
                </div>
            </div>
        `).join('');
    }

    function renderCategories() {
        const container = document.getElementById('categoriesList');
        container.innerHTML = categories.map(cat => `
            <div class="card">
                <div class="flex-between">
                    <div>
                        <img src="${cat.image}" width="50">
                        <strong>${cat.name}</strong>
                    </div>
                    <span class="status-badge ${cat.active ? 'status-active' : 'status-inactive'}">${cat.active ? 'نشط' : 'مخفي'}</span>
                </div>
                <div class="flex-between">
                    <button class="small" onclick="editCategory('${cat.id}')"><i class="fas fa-edit"></i> تعديل</button>
                    <button class="small" onclick="toggleCategory('${cat.id}')"><i class="fas fa-eye${cat.active ? '-slash' : ''}"></i> ${cat.active ? 'إخفاء' : 'إظهار'}</button>
                    <button class="small danger" onclick="deleteCategory('${cat.id}')"><i class="fas fa-trash"></i> حذف</button>
                </div>
            </div>
        `).join('');
    }

    function renderProducts() {
        const container = document.getElementById('productsList');
        const catsMap = Object.fromEntries(categories.map(c => [c.id, c.name]));
        container.innerHTML = products.map(prod => `
            <div class="card">
                <div class="flex-between">
                    <div>
                        <img src="${prod.image}" width="50">
                        <strong>${prod.name}</strong> - ${prod.price} ر.س 
                        ${prod.oldprice ? `<span style="text-decoration:line-through">${prod.oldprice}</span>` : ''}
                    </div>
                    <span class="status-badge ${prod.active ? 'status-active' : 'status-inactive'}">${prod.active ? 'نشط' : 'مخفي'}</span>
                </div>
                <div>الفئة: ${catsMap[prod.categoryId] || 'غير محدد'}</div>
                <div>الوصف: ${prod.desc || 'لا يوجد'}</div>
                <div class="flex-between">
                    <button class="small" onclick="editProduct('${prod.id}')"><i class="fas fa-edit"></i> تعديل</button>
                    <button class="small" onclick="toggleProduct('${prod.id}')"><i class="fas fa-eye${prod.active ? '-slash' : ''}"></i> ${prod.active ? 'إخفاء' : 'إظهار'}</button>
                    <button class="small danger" onclick="deleteProduct('${prod.id}')"><i class="fas fa-trash"></i> حذف</button>
                </div>
            </div>
        `).join('');
    }

    // إعلانات
    window.toggleAd = async (id) => {
        const ad = ads.find(a => a.id === id);
        ad.active = !ad.active;
        await saveToFirebase();
        renderAds();
    };
    window.deleteAd = async (id) => {
        ads = ads.filter(a => a.id !== id);
        await saveToFirebase();
        renderAds();
    };
    document.getElementById('addAdBtn')?.addEventListener('click', async () => {
        let img = prompt("رابط صورة الإعلان");
        let text = prompt("نص الإعلان (اختياري)");
        if (img) {
            ads.push({ id: Date.now().toString(), image: img, text: text || '', active: true });
            await saveToFirebase();
            renderAds();
        }
    });

    // فئات
    window.editCategory = async (id) => {
        let cat = categories.find(c => c.id === id);
        let newName = prompt("اسم الفئة الجديد", cat.name);
        let newImg = prompt("رابط صورة الفئة", cat.image);
        if (newName) cat.name = newName;
        if (newImg) cat.image = newImg;
        await saveToFirebase();
        renderCategories();
    };
    window.toggleCategory = async (id) => {
        let cat = categories.find(c => c.id === id);
        cat.active = !cat.active;
        await saveToFirebase();
        renderCategories();
    };
    window.deleteCategory = async (id) => {
        if (confirm("حذف الفئة سيحذف كل منتجاتها!")) {
            categories = categories.filter(c => c.id !== id);
            products = products.filter(p => p.categoryId !== id);
            await saveToFirebase();
            renderAll();
        }
    };
    document.getElementById('addCategoryBtn')?.addEventListener('click', async () => {
        let name = prompt("اسم الفئة الجديدة");
        let img = prompt("رابط صورة الفئة", "https://cdn-icons-png.flaticon.com/512/1077/1077035.png");
        if (name) {
            categories.push({ id: Date.now().toString(), name, image: img, active: true });
            await saveToFirebase();
            renderCategories();
        }
    });

    // منتجات
    window.editProduct = async (id) => {
        let prod = products.find(p => p.id === id);
        let newName = prompt("اسم المنتج", prod.name);
        let newPrice = prompt("السعر", prod.price);
        let newOld = prompt("السعر قبل الخصم", prod.oldprice || '');
        let newDesc = prompt("الوصف", prod.desc || '');
        let newImg = prompt("رابط الصورة", prod.image);
        let catList = categories.map(c => `${c.id}: ${c.name}`).join('\n');
        let newCatId = prompt(`معرف الفئة:\n${catList}`, prod.categoryId);
        if (newName) prod.name = newName;
        if (newPrice) prod.price = newPrice;
        prod.oldprice = newOld || '';
        if (newDesc) prod.desc = newDesc;
        if (newImg) prod.image = newImg;
        if (newCatId) prod.categoryId = newCatId;
        await saveToFirebase();
        renderProducts();
    };
    window.toggleProduct = async (id) => {
        let prod = products.find(p => p.id === id);
        prod.active = !prod.active;
        await saveToFirebase();
        renderProducts();
    };
    window.deleteProduct = async (id) => {
        products = products.filter(p => p.id !== id);
        await saveToFirebase();
        renderProducts();
    };
    document.getElementById('addProductBtn')?.addEventListener('click', async () => {
        let name = prompt("اسم المنتج");
        let price = prompt("السعر");
        if (!name || !price) return;
        let catList = categories.map(c => `${c.id}: ${c.name}`).join('\n');
        let catId = prompt(`معرف الفئة:\n${catList}`);
        if (!catId) return;
        products.push({
            id: Date.now().toString(),
            name, price, oldprice: '', desc: '',
            image: "https://via.placeholder.com/200x200",
            categoryId: catId, active: true
        });
        await saveToFirebase();
        renderProducts();
    });

    loadAllData();
</script>
</body>
</html>
