<body>

    <nav class="navbar-desktop">

            </div>
        </div>
    </nav>

    <!-- Navbar للشاشات الصغيرة (بدون عربة، مع زر بحث) -->
    <div class="navbar-mobile">
        <div class="mobile-nav-item active" data-page="home">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </div>
        <div class="mobile-nav-item" id="mobileSearchBtn">
            <i class="fas fa-search"></i>

        </div>
        <div class="mobile-nav-item" data-page="categories">
            <i class="fas fa-th-large"></i>
            <span>الفئات</span>
        </div>
    </div>

    <!-- حاوية الإعلانات -->
    <div class="ads-slider-container">
        <div class="ads-slider" id="adsSlider"></div>
        <button class="slider-btn prev" id="prevAdBtn">❮</button>
        <button class="slider-btn next" id="nextAdBtn">❯</button>
    </div>

    <!-- شبكة الفئات -->
    <div class="categories-grid" id="categoriesGrid"></div>

    <!-- نافذة عرض المنتجات المنبثقة -->
    <div class="products-section" id="productsSection" style="display: none;">
        <div class="products-header">
            <button class="close-products" id="closeProductsBtn"><i class="fas fa-times"></i></button>
            <h3 id="selectedCategoryTitle"></h3>
        </div>
        <div class="scroll-products" id="productsScroll"></div>
    </div>

    <!-- نافذة تفاصيل المنتج -->
    <div class="product-modal" id="productModal" style="display: none;">
        <div class="product-modal-content">
            <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
            <div id="modalProductDetails"></div>
            <div class="payment-options">
                <button class="whatsapp-btn" id="whatsappBuyBtn"><i class="fab fa-whatsapp"></i> شراء عبر واتساب</button>
                <button class="qrcode-btn" id="qrcodeBuyBtn"><i class="fas fa-qrcode"></i> دفع عبر باركود</button>
            </div>
            <div id="qrcodeContainer" style="text-align: center; margin-top: 1rem; display: none;"></div>
        </div>
    </div>

    <!-- مودال التواصل -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>تواصل معنا</h3>
            <p>البريد الإلكتروني: <a href="mailto:info@anath.com">info@anath.com</a></p>
            <p>واتساب: <a href="https://wa.me/9665XXXXXXX" target="_blank">+966 5XXXXXXX</a></p>
        </div>
    </div>

    <footer class="footer">

            <div class="footer-section">
                <h4><i class="fas fa-feather-alt"></i> إناث</h4>

            <div class="footer-section">
                <h4>تواصل معنا</h4>
                <p><i class="fas fa-phone"></i> <a href="tel:+9665XXXXXXX">+963 954-879-356</a></p>
                <p><i class="fas fa-envelope"></i> <a href="mailto:info@anath.com">ahmadkelaui166@gmail.com</a></p>
                <p><i class="fab fa-whatsapp"></i> <a href="https://wa.me/9665XXXXXXX" target="_blank">واتساب: </a></p>

            <div class="footer-section">
