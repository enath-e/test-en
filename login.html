<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الأدمن - إناث</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #f4f1ea; display: flex; justify-content: center; align-items: center; height: 100vh; direction: rtl; }
        .login-box { background: white; padding: 2rem; border-radius: 30px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .login-box h2 { color: #b5838d; margin-bottom: 1rem; }
        .input-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 25px; }
        button { width: 100%; padding: 12px; background: #b5838d; color: white; border: none; border-radius: 25px; cursor: pointer; }
        .error { color: #e5989b; margin-top: 10px; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔐 دخول الأدمن</h2>
    <div class="input-group">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
    </div>
    <div class="input-group">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
    </div>
    <button id="loginButton">دخول</button>
    <div id="errorMsg" class="error"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script>
    // إعدادات Firebase (نفس الموجودة في admin.html)
    const firebaseConfig = {

  apiKey: "AIzaSyD6CcJDUiXgCQxe_aL_j2aEi1nuQ2X2o5s",
  authDomain: "enath-7d5e8.firebaseapp.com",
  databaseURL: "https://enath-7d5e8-default-rtdb.firebaseio.com",
  projectId: "enath-7d5e8",
  storageBucket: "enath-7d5e8.firebasestorage.app",
  messagingSenderId: "101026768739",
  appId: "1:101026768739:web:c3635b04e972914a5b1556"

    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const loginBtn = document.getElementById('loginButton');
    const emailInput = document.getElementById('loginEmail');
    const passInput = document.getElementById('loginPassword');
    const errorDiv = document.getElementById('errorMsg');

    loginBtn.onclick = async () => {
        const email = emailInput.value.trim();
        const password = passInput.value;
        if (!email || !password) {
            errorDiv.innerText = 'الرجاء إدخال البريد الإلكتروني وكلمة المرور';
            return;
        }
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (err) {
            console.error(err);
            let msg = 'بيانات الدخول غير صحيحة';
            if (err.code === 'auth/user-not-found') msg = 'لا يوجد حساب بهذا البريد';
            else if (err.code === 'auth/wrong-password') msg = 'كلمة المرور غير صحيحة';
            else if (err.code === 'auth/invalid-email') msg = 'البريد الإلكتروني غير صالح';
            errorDiv.innerText = msg;
        }
    };

    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.href = 'admin.html';
        }
    });
</script>
</body>
</html>
