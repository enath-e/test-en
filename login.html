<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الأدمن - أناث</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background: #f4f1ea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            direction: rtl;
        }
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        .login-box h2 {
            color: #b5838d;
            margin-bottom: 1.5rem;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
        }
        .login-box button {
            background: #b5838d;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-box button:hover {
            background: #e5989b;
        }
        .error {
            color: #e5989b;
            margin-top: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 دخول لوحة التحكم</h2>
        <input type="password" id="passwordInput" placeholder="أدخل كلمة المرور">
        <button onclick="checkPassword()">دخول</button>
        <div id="errorMsg" class="error"></div>
    </div>

    <script>
        const correctPassword = "ahmad@123"; // غير كلمة السر هنا
        
        function checkPassword() {
            const userPassword = document.getElementById('passwordInput').value;
            
            if (userPassword === correctPassword) {
                // حفظ جلسة الدخول
                sessionStorage.setItem('adminAuthenticated', 'true');
                // الانتقال إلى صفحة الأدمن
                window.location.href = 'admin.html';
            } else {
                document.getElementById('errorMsg').innerHTML = '❌ كلمة المرور غير صحيحة';
            }
        }
        
        // إذا حاول المستخدم الدخول مباشرة إلى admin.html
        if (window.location.pathname.includes('admin.html')) {
            if (sessionStorage.getItem('adminAuthenticated') !== 'true') {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
