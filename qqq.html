<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الأدمن - إناث</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #f4f1ea; display: flex; justify-content: center; align-items: center; height: 100vh; direction: rtl; }
        .login-box { background: white; padding: 2rem; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        .login-box h2 { color: #b5838d; margin-bottom: 1.5rem; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 25px; }
        .login-box button { background: #b5838d; color: white; border: none; padding: 12px; width: 100%; border-radius: 25px; cursor: pointer; }
        .error { color: #e5989b; margin-top: 10px; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔐 دخول لوحة التحكم</h2>
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="checkPassword()">دخول</button>
    <div id="errorMsg" class="error"></div>
</div>
<script>
    const correctPassword = "admin123";
    function checkPassword() {
        const pwd = document.getElementById('password').value;
        if (pwd === correctPassword) {
            sessionStorage.setItem('adminAuth', 'true');
            window.location.href = 'admin.html';
        } else {
            document.getElementById('errorMsg').innerText = 'كلمة المرور غير صحيحة';
        }
    }

    // منع الوصول المباشر إلى admin.html إذا لم يتم تسجيل الدخول
    // هذا الكود سيتم تنفيذه فقط إذا تم فتح هذه الصفحة كـ login.html
    // التأكد أن المستخدم ليس في admin.html بالفعل
    if (window.location.pathname.includes('admin.html')) {
        if (sessionStorage.getItem('adminAuth') !== 'true') {
            window.location.href = 'login.html';
        }
    }
</script>
</body>
</html>
